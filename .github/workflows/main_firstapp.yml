name: Build and deploy Node.js app to Azure Web App - firstapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'   # safer than 24 for compatibility

      - name: Install dependencies
        run: npm install

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_117D43D153744D47B1BE3CA0467B6E17 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A8A975D217B44A7E83DEF3AF3B61D4EE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_29AEC6B95C784DE4BA9FA7B6BA8D281C }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'firstapp'
          slot-name: 'Production'
          package: .
